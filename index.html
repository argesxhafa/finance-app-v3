<!doctype html>
<!--
  ============================================================================
  PERSONAL FINANCE - v3
  Single-file app. No server, no build step, no dependencies.

  HOW TO RUN
    - Open this file in any browser (double-click it), or
    - Host it as a static page (GitHub Pages, Netlify, any static host).

  IPHONE HOME SCREEN (runs like a native app)
    1. Open the page in Safari on your iPhone.
    2. Tap the Share button, then "Add to Home Screen".
    3. Launch it from the icon. It opens full screen with no browser chrome.

  DATA
    All data is stored permanently in the browser's localStorage under the
    key "finance-app-v3". Nothing is ever sent anywhere. Data persists until
    you wipe the browser's site data (there is deliberately no in-app way
    to clear everything).
    NOTE: localStorage is per-browser, per-device - use the same browser you
    entered the data in.

  BACKUP / RESTORE
    "Export data" (bottom of the app) saves everything - both people's
    shifts, budgets, debts, goals, and pay-rate settings - as a JSON file
    named finance-backup-YYYY-MM-DD.json (on iPhone it opens the share
    sheet; save to Files or email it to yourself). "Import data" restores
    a backup file, replacing current data after a confirmation. Importing
    a backup onto a fresh install recreates everything exactly.

  CHANGE THE PASSWORD / RATE DEFAULTS
    Scroll down to the block marked  "===== SETTINGS - EDIT HERE ====="
    at the very top of the <script> section:
      APP_PASSWORD            the login password (default "money")
      DEFAULT_BASE_RATE       hourly wage default ($15.00)
      DEFAULT_OT_MULTIPLIER   overtime multiplier default (1.5)
      DEFAULT_VAC_PERCENT     vacation pay percent default (6)
    Base rate / OT / VAC are also editable in the app itself (Shifts tab,
    "Pay rates" card) and those edits are saved permanently.
  ============================================================================
-->

<style>
:root{
  --green:#15803d;
  --green-dk:#10522d;
  --green-mid:#1b8d4c;
  --green-tint:#e6f2ea;
  --bg:#f3f6f3;
  --card:#ffffff;
  --text:#16211a;
  --muted:#5c6b61;
  --line:#dde5de;
  --line-soft:#eaf0ea;
  --danger:#b3261e;
  --amber:#c9a04a;
  --shadow:0 1px 2px rgba(22,33,26,.05),0 4px 14px rgba(22,33,26,.05);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit;-webkit-tap-highlight-color:transparent}
input{font:inherit;color:inherit}
input[type=date],input[type=time]{
  -webkit-appearance:none;appearance:none;
  min-width:0;max-width:100%;min-height:39px;
}
input::-webkit-date-and-time-value{text-align:left}
.wrap{max-width:760px;margin:0 auto;padding:0 14px}

/* ---------- gate ---------- */
#gate{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px}
body.locked #gate{display:flex}
body.locked #app{display:none}
.gate-card{
  width:100%;max-width:320px;background:var(--card);border:1px solid var(--line);
  border-radius:18px;box-shadow:var(--shadow);padding:34px 28px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.gate-card.shake{animation:shake .45s}
@keyframes shake{
  10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}
  30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}
}
.mark{
  width:58px;height:58px;border-radius:15px;flex:none;
  background:linear-gradient(180deg,var(--green-mid),var(--green-dk));
  color:#fff;font-weight:800;font-size:30px;
  display:flex;align-items:center;justify-content:center;
}
.mark.sm{width:28px;height:28px;font-size:15px;border-radius:8px}
.gate-title{font-size:21px;font-weight:800;letter-spacing:-.01em}
#pw{
  width:100%;text-align:center;font-size:18px;letter-spacing:.12em;
  padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fbfdfb;outline:none;
}
#pw:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(21,128,61,.14)}
#pw.bad{border-color:var(--danger)}

/* ---------- buttons ---------- */
.btn{border-radius:10px;padding:10px 16px;font-weight:650;font-size:15px;line-height:1.2}
.btn.sm{padding:8px 13px;font-size:13.5px}
.btn.wide{width:100%}
.btn.primary{background:var(--green-dk);color:#fff}
.btn.primary:active{background:#0b3d21}
.btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--text)}
.btn.ghost:disabled{opacity:.45;cursor:default}
.btn.ghost.danger{color:var(--danger)}
.link{font-size:13px;font-weight:650;padding:6px 2px}
.link.danger{color:var(--danger)}

/* ---------- header / nav ---------- */
#top{
  position:sticky;top:0;z-index:20;
  padding-top:env(safe-area-inset-top);
  background:rgba(243,246,243,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line-soft);
}
#top .bar{display:flex;align-items:center;justify-content:space-between;padding-top:10px;padding-bottom:10px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.01em}
#mainNav{
  display:flex;gap:4px;background:#e2e9e3;border-radius:12px;padding:4px;margin:14px 0 4px;
}
#mainNav button{
  flex:1;padding:9px 4px;border-radius:9px;font-weight:650;font-size:14.5px;color:var(--muted);
}
#mainNav button.on{background:var(--green-dk);color:#fff;box-shadow:0 1px 3px rgba(16,82,45,.35)}
.subnav{display:flex;gap:2px;margin:10px 0 14px;border-bottom:1px solid var(--line)}
.subnav button{
  padding:9px 12px;font-weight:650;font-size:14px;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.subnav button.on{color:var(--green-dk);border-bottom-color:var(--green-dk)}

/* ---------- layout blocks ---------- */
#content{padding-bottom:8px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:15px;margin-bottom:12px;
}
.card-h{font-size:15px;font-weight:750;margin-bottom:12px;letter-spacing:-.01em}
.card-h .count{color:var(--muted);font-weight:600;font-size:13px;margin-left:6px}
.tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.tiles.t2{grid-template-columns:repeat(2,minmax(0,1fr))}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:0}
.tile.hero{background:var(--green-tint);border-color:#cbe2d3}
.tile .tl{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700;white-space:nowrap}
.tile .tv{font-size:clamp(13px,3.9vw,17px);font-weight:750;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile .tv.pos{color:var(--green-dk)}
.tile .tv.neg{color:var(--danger)}
.tile .ts{font-size:11.5px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inner-tiles{margin-bottom:0;margin-top:2px}

/* ---------- forms ---------- */
.f{display:flex;flex-direction:column;gap:4px;min-width:0}
.f>.cl,.f>span:first-child{
  font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
}
.cl{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.f input{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;
  background:#fbfdfb;font-size:16px;outline:none;min-width:0;min-height:39px;font-variant-numeric:tabular-nums;
}
.f input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(21,128,61,.13)}
.f input.err{border-color:var(--danger)}
.f.is-ovr input{border-color:var(--amber);background:#fffcf4}
.autobtn{
  display:none;font-size:10px;font-weight:700;color:var(--green-dk);
  text-decoration:underline;text-transform:none;letter-spacing:.02em;padding:0 2px;
}
.f.is-ovr .autobtn{display:inline}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.grid4{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(min-width:620px){.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}}
.btnrow{display:flex;gap:10px;margin-top:13px}
.btnrow .btn{flex:1}

/* ---------- budget rows ---------- */
.brow{display:grid;grid-template-columns:minmax(0,1fr) 104px auto;gap:8px;align-items:center;margin-bottom:8px}
.brow input{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;
  background:#fbfdfb;font-size:16px;outline:none;min-width:0;
}
.brow input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(21,128,61,.13)}
.brow input[data-field="amount"]{text-align:right;font-variant-numeric:tabular-nums}
.addline{margin-top:4px}

/* ---------- shifts ---------- */
.shift{padding:12px 0 2px;border-top:1px solid var(--line-soft);margin-top:10px}
.shift:first-of-type{border-top:none;margin-top:0;padding-top:2px}
.shift-top{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.shift-top input[type=date]{
  padding:7px 9px;border:1px solid var(--line);border-radius:9px;background:#fbfdfb;
  font-size:16px;outline:none;
}
.shift-top input[type=date]:focus{border-color:var(--green)}
.dow{font-weight:750;color:var(--green-dk);font-size:14px}
.shift-top .link{margin-left:auto}
.shift-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
@media(min-width:620px){.shift-grid{grid-template-columns:repeat(7,minmax(0,1fr))}}

/* ---------- shift calendar ---------- */
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cal-nav{
  width:38px;height:38px;flex:none;border:1px solid var(--line);border-radius:10px;
  background:#fbfdfb;font-size:22px;line-height:1;font-weight:700;color:var(--green-dk);
  display:flex;align-items:center;justify-content:center;padding:0 0 3px;
}
.cal-title{flex:1;text-align:center;font-weight:750;font-size:15px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--muted);padding:3px 0 5px}
.cal-day{
  min-height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;font-size:14px;font-weight:650;color:var(--text);
  background:#eef3ee;border:1.5px solid transparent;padding:3px 0;min-width:0;
}
.cal-day.blank{background:transparent}
.cal-day.has{background:var(--green);color:#fff;font-weight:750}
.cal-day.today{border-color:var(--green-dk)}
.cal-day.sel{box-shadow:0 0 0 2.5px var(--green-dk)}
.cal-amt{font-size:9px;font-weight:700;color:#d7ecdf;max-width:100%;overflow:hidden}

/* ---------- tracked income row ---------- */
.brow.auto-row{
  grid-template-columns:minmax(0,1fr) auto;background:var(--green-tint);
  border:1px solid #cbe2d3;border-radius:10px;padding:8px 11px;
}
.auto-name{font-size:14.5px;font-weight:650;display:flex;flex-direction:column;gap:1px;min-width:0}
.auto-name span{font-size:11px;color:var(--muted);font-weight:600}
.auto-amt{font-weight:750;font-variant-numeric:tabular-nums;font-size:15.5px;color:var(--green-dk);white-space:nowrap}

/* ---------- tables ---------- */
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.tbl th{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
  text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:700;white-space:nowrap;
}
.tbl td{padding:8px;border-bottom:1px solid var(--line-soft);text-align:right;font-size:14px;white-space:nowrap}

/* ---------- debt / savings ---------- */
.rowhead{display:flex;align-items:center;gap:10px;margin-bottom:11px}

.slider-top .sv{font-weight:750;font-size:15px;color:var(--green-dk);font-variant-numeric:tabular-nums}
input[type=range]{width:100%;accent-color:var(--green-dk);height:28px}

}

  </footer>
</div>

<script>
'use strict';

/* ============================================================
   ===== SETTINGS - EDIT HERE =================================
   ============================================================ */
const APP_PASSWORD = 'money';            // <-- change the password here

const DEFAULT_BASE_RATE      = 15.00;    // $/hour
const DEFAULT_OT_MULTIPLIER  = 1.5;      // overtime pay multiplier (hours over 8)
const DEFAULT_VAC_PERCENT    = 6;        // vacation pay % added on top of wages
/* ============================================================ */

const LS_KEY = 'finance-app-v3';
const PEOPLE = ['arges','hannah'];
const NAMES  = { arges:'Arges', hannah:'Hannah' };
const C = { green:'#15803d', greenDk:'#10522d', gray:'#64748b', axis:'#44514a', grid:'#dfe6e0', ink:'#16211a' };

/* ---------- state ---------- */
function personDefaults(){
  return {
    budget:{ income:[], expenses:[] },
    shifts:[],
    rates:{ base:DEFAULT_BASE_RATE, ot:DEFAULT_OT_MULTIPLIER, vac:DEFAULT_VAC_PERCENT },
    debts:[],
    goals:[]
  };
}
function defaultState(){
  return {
    people:{ arges:personDefaults(), hannah:personDefaults() },
    ui:{ main:'arges', sub:{ arges:'budget', hannah:'budget' } }
  };
}
function normalizeState(p){
  const st = defaultState();
  if(!p || typeof p!=='object') return st;
  for(const k of PEOPLE){
    const src = p.people && p.people[k];
    if(!src) continue;
    const t = st.people[k];
    if(src.budget){
      t.budget.income   = Array.isArray(src.budget.income)   ? src.budget.income   : [];
      t.budget.expenses = Array.isArray(src.budget.expenses) ? src.budget.expenses : [];
    }
    if(Array.isArray(src.shifts)) t.shifts = src.shifts;
    if(src.rates && typeof src.rates==='object') Object.assign(t.rates, src.rates);
    if(Array.isArray(src.debts)) t.debts = src.debts;
    if(Array.isArray(src.goals)) t.goals = src.goals;
  }
  if(p.ui){
    if(PEOPLE.concat('combined').includes(p.ui.main)) st.ui.main = p.ui.main;
    if(p.ui.sub) Object.assign(st.ui.sub, p.ui.sub);
  }
  return st;
}
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    return normalizeState(JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
let state = loadState();
const undoStacks = { arges:[], hannah:[] };
const calState = { arges:{ym:null,sel:null}, hannah:{ym:null,sel:null} };

function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

/* ---------- utils ---------- */
const $ = s => document.querySelector(s);
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const cadFmt = new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD'});
function fm(n){ return cadFmt.format(isFinite(n)?n:0); }
function fm0(n){ return '$' + Math.round(isFinite(n)?n:0).toLocaleString('en-CA'); }
function fmT(n){ return Math.abs(isFinite(n)?n:0)>=1000 ? fm0(n) : fm(n); }
function round2(n){ return Math.round(n*100)/100; }
function fixed2(n){ return (Math.round((isFinite(n)?n:0)*100)/100).toFixed(2); }
function parseNum(raw){
  if(raw==null) return null;
  const s = String(raw).replace(/[$,\s]/g,'');
  if(s==='') return null;
  const n = parseFloat(s);
  return isFinite(n) ? n : null;
}
function localDate(iso){ const p=String(iso||'').split('-').map(Number); return new Date(p[0]||1970,(p[1]||1)-1,p[2]||1); }
function dow(iso){ try{ return localDate(iso).toLocaleDateString('en-CA',{weekday:'short'}); }catch(e){ return ''; } }
function fmtDateLong(iso){ try{ return localDate(iso).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}); }catch(e){ return iso; } }
function monthLabel(key){ const p=key.split('-').map(Number); return new Date(p[0],p[1]-1,1).toLocaleDateString('en-CA',{month:'long',year:'numeric'}); }
function monthShort(key){ const p=key.split('-').map(Number); return new Date(p[0],p[1]-1,1).toLocaleDateString('en-CA',{month:'short',year:'2-digit'}); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function inMonths(n){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+n); return d.toLocaleDateString('en-CA',{month:'short',year:'numeric'}); }
function yrMo(m){
  m = Math.max(0, Math.round(m));
  const y=Math.floor(m/12), r=m%12;
  if(m===0) return '0 mo';
  if(y===0) return r+' mo';
  if(r===0) return y+' yr';
  return y+' yr '+r+' mo';
}
function sumAmt(list){ return round2(list.reduce((a,x)=>a+(x.amount||0),0)); }

/* ---------- shift calculations ---------- */
function calcHours(s){
  if(s.ovr && s.ovr.hours!=null) return s.ovr.hours;
  if(!s.in || !s.out) return 0;
  const a=s.in.split(':').map(Number), b=s.out.split(':').map(Number);
  let mins=(b[0]*60+b[1])-(a[0]*60+a[1]);
  if(mins<0) mins+=1440;                    // shift crosses midnight
  return round2(mins/60);
}
function calcWage(s,r){
  if(s.ovr && s.ovr.wage!=null) return s.ovr.wage;
  const h=calcHours(s);
  const reg=Math.min(h,8), ot=Math.max(h-8,0);
  return round2((reg*r.base + ot*r.base*r.ot) * (1 + r.vac/100));
}
function calcTotal(s,r){
  if(s.ovr && s.ovr.total!=null) return s.ovr.total;
  return round2(calcWage(s,r) + (s.tips||0));
}
function calcRate(s,r){
  if(s.ovr && s.ovr.rate!=null) return s.ovr.rate;
  const h=calcHours(s);
  return h>0 ? round2(calcTotal(s,r)/h) : 0;
}
function fieldValue(s,r,f){
  return f==='hours'?calcHours(s) : f==='wage'?calcWage(s,r) : f==='total'?calcTotal(s,r) : calcRate(s,r);
}
function autoValue(s,r,f){                  // computed value ignoring this field's own override
  const t = Object.assign({}, s, { ovr: Object.assign({}, s.ovr||{}) });
  delete t.ovr[f];
  return fieldValue(t,r,f);
}
function shiftTotals(shifts,r){
  let hours=0,wages=0,tips=0,total=0;
  for(const s of shifts){
    hours+=calcHours(s); wages+=calcWage(s,r); tips+=(s.tips||0); total+=calcTotal(s,r);
  }
  hours=round2(hours);
  return { n:shifts.length, hours, wages:round2(wages), tips:round2(tips), total:round2(total),
           avg: hours>0 ? round2(total/hours) : 0 };
}
function trackedIncome(p){        // current month's shift earnings, fed into Budget income
  const ym=todayISO().slice(0,7);
  const per=state.people[p];
  let t=0;
  for(const s of per.shifts){ if((s.date||'').slice(0,7)===ym) t+=calcTotal(s,per.rates); }
  return round2(t);
}
function shiftYM(ym,delta){
  const parts=ym.split('-').map(Number);
  let y=parts[0], m=parts[1]+delta;
  if(m<1){ m=12; y--; }
  if(m>12){ m=1; y++; }
  return y+'-'+String(m).padStart(2,'0');
}

/* ---------- undo (shift tracker) ---------- */
function pushUndo(p){
  const st=undoStacks[p];
  st.push(JSON.stringify(state.people[p].shifts));
  if(st.length>40) st.shift();
  updateUndoBtn(p);
}
function doUndo(p){
  const st=undoStacks[p];
  if(!st.length) return;
  state.people[p].shifts = JSON.parse(st.pop());
  save(); renderContent();
}
function updateUndoBtn(p){
  const el=document.querySelector('#content [data-person="'+p+'"] [data-act="undo"]');
  if(el) el.disabled = !undoStacks[p].length;
}

/* ---------- charts (hand-rolled SVG) ---------- */
function niceMax(v){
  if(!(v>0)) return 1;
  const p=Math.pow(10,Math.floor(Math.log10(v)));
  for(const m of [1,1.5,2,2.5,3,4,5,6,8,10]){ if(m*p>=v) return m*p; }
  return 10*p;
}
function fmtShort(n){
  if(n>=1000){ const k=n/1000; return '$'+(k>=100?Math.round(k):Math.round(k*10)/10)+'k'; }
  return '$'+Math.round(n);
}
function svgLine(series){
  const W=360,H=235,L=46,R=8,T=12,B=36;
  let maxX=1,maxY=0;
  for(const s of series){ for(const pt of s.pts){ if(pt[0]>maxX)maxX=pt[0]; if(pt[1]>maxY)maxY=pt[1]; } }
  maxY=niceMax(maxY);
  const x=v=>L+(v/maxX)*(W-L-R), y=v=>T+(1-v/maxY)*(H-T-B);
  let out='';
  for(let i=0;i<=4;i++){
    const val=maxY*i/4, yy=y(val);
    out+='<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="'+C.grid+'" stroke-width="1"/>';
    out+='<text x="'+(L-6)+'" y="'+(yy+3.5)+'" text-anchor="end" font-size="10.5" fill="'+C.axis+'">'+fmtShort(val)+'</text>';
  }
  let step=1;
  for(const c of [1,2,3,6,12,24,36,60,120]){ if(maxX/c<=7){ step=c; break; } step=c; }
  for(let m=step;m<=maxX;m+=step){
    out+='<text x="'+x(m)+'" y="'+(H-B+15)+'" text-anchor="middle" font-size="10.5" fill="'+C.axis+'">'+m+'</text>';
  }
  out+='<text x="'+((L+W-R)/2)+'" y="'+(H-3)+'" text-anchor="middle" font-size="10" font-weight="600" fill="'+C.axis+'">months</text>';
  out+='<line x1="'+L+'" y1="'+y(0)+'" x2="'+(W-R)+'" y2="'+y(0)+'" stroke="'+C.axis+'" stroke-width="1"/>';
  for(const s of series){
    const d=s.pts.map((pt,i)=>(i?'L':'M')+x(pt[0]).toFixed(1)+' '+y(pt[1]).toFixed(1)).join(' ');
    out+='<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round"'+(s.dash?' stroke-dasharray="5 4"':'')+'/>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img">'+out+'</svg>';
}
function svgBarsH(items){
  const rows=items.filter(i=>i.value>0);
  if(!rows.length) return '';
  const W=360,labelW=106,valW=58,rowH=28,H=rows.length*rowH+2;
  const max=Math.max.apply(null,rows.map(r=>r.value));
  let out='';
  rows.forEach((r,i)=>{
    const yy=i*rowH;
    let lab=r.label||'';
    if(lab.length>14) lab=lab.slice(0,13)+'…';
    const bw=Math.max(2,(r.value/max)*(W-labelW-valW-8));
    out+='<text x="0" y="'+(yy+18)+'" font-size="11.5" fill="'+C.ink+'">'+esc(lab)+'</text>';
    out+='<rect x="'+labelW+'" y="'+(yy+7)+'" width="'+bw.toFixed(1)+'" height="13" rx="4" fill="'+C.green+'"/>';
    out+='<text x="'+W+'" y="'+(yy+18)+'" text-anchor="end" font-size="11.5" font-weight="600" fill="'+C.ink+'">'+fm0(r.value)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img">'+out+'</svg>';
}
function svgColumns(items){
  if(!items.length) return '';
  const W=360,H=230,L=46,R=6,T=16,B=46;
  const maxY=niceMax(Math.max.apply(null,items.map(i=>i.value)));
  const plotW=W-L-R, slot=plotW/items.length, colW=Math.min(slot*0.62,44);
  const y=v=>T+(1-v/maxY)*(H-T-B);
  let out='';
  for(let i=0;i<=4;i++){
    const val=maxY*i/4, yy=y(val);
    out+='<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="'+C.grid+'" stroke-width="1"/>';
    out+='<text x="'+(L-6)+'" y="'+(yy+3.5)+'" text-anchor="end" font-size="10.5" fill="'+C.axis+'">'+fmtShort(val)+'</text>';
  }
  items.forEach((it,i)=>{
    const cx=L+slot*i+slot/2, xx=cx-colW/2, yy=y(it.value), hh=(H-B)-yy;
    out+='<rect x="'+xx.toFixed(1)+'" y="'+yy.toFixed(1)+'" width="'+colW.toFixed(1)+'" height="'+Math.max(0,hh).toFixed(1)+'" rx="3" fill="'+C.green+'"/>';
    if(items.length<=8)
      out+='<text x="'+cx.toFixed(1)+'" y="'+(yy-4).toFixed(1)+'" text-anchor="middle" font-size="10" font-weight="600" fill="'+C.ink+'">'+fmtShort(it.value)+'</text>';
    out+='<text x="'+cx.toFixed(1)+'" y="'+(H-B+14)+'" text-anchor="end" font-size="10" fill="'+C.axis+'" transform="rotate(-40 '+cx.toFixed(1)+' '+(H-B+14)+')">'+esc(it.label)+'</text>';
  });
  out+='<line x1="'+L+'" y1="'+(H-B)+'" x2="'+(W-R)+'" y2="'+(H-B)+'" stroke="'+C.axis+'" stroke-width="1"/>';
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img">'+out+'</svg>';
}

/* ---------- amortization ---------- */
function amortize(balance,apr,term,extra){
  if(!(balance>0) || !(term>0) || !(apr>=0)) return null;
  const r=apr/100/12;
  const pay = r>0 ? balance*r/(1-Math.pow(1+r,-term)) : balance/term;
  if(!isFinite(pay) || pay<=0) return null;
  let bal=balance, ti=0, m=0;
  const rows=[], pts=[[0,balance]];
  while(bal>0.005 && m<1200){
    m++;
    const interest=bal*r;
    let payment=pay+(extra||0);
    if(payment-interest<=0.0001) return null;
    let principal=payment-interest;
    if(principal>=bal-0.005){ principal=bal; payment=principal+interest; bal=0; }
    else bal-=principal;
    ti+=interest;
    rows.push({m, payment, interest, principal, bal});
    pts.push([m,bal]);
  }
  return { payment:pay, months:m, totalInterest:round2(ti), rows, pts };
}

/* ============================================================
   RENDERING
   ============================================================ */
function tile(label,value,sub,cls){
  return '<div class="tile'+(cls&&cls.indexOf('hero')>-1?' hero':'')+'">'
    +'<div class="tl">'+label+'</div>'
    +'<div class="tv'+(cls?' '+cls.replace('hero','').trim():'')+'">'+value+'</div>'
    +(sub?'<div class="ts">'+sub+'</div>':'')
    +'</div>';
}

function render(){ renderNav(); renderContent(); }
function renderNav(){
  document.querySelectorAll('#mainNav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===state.ui.main));
}
function renderContent(){
  const m=state.ui.main;
  $('#content').innerHTML = m==='combined' ? combinedHTML() : personHTML(m);
}

function personHTML(p){
  const sub=state.ui.sub[p]||'budget';
  const tabs=[['budget','Budget'],['shifts','Shifts'],['debt','Debt'],['savings','Savings']];
  return '<nav class="subnav">'
    + tabs.map(t=>'<button data-act="sub-tab" data-person="'+p+'" data-tab="'+t[0]+'" class="'+(t[0]===sub?'on':'')+'">'+t[1]+'</button>').join('')
    + '</nav>'
    + '<div data-person="'+p+'">'
    + (sub==='budget'?budgetHTML(p) : sub==='shifts'?shiftsHTML(p) : sub==='debt'?debtHTML(p) : savingsHTML(p))
    + '</div>';
}

/* ---------- budget ---------- */
function budgetTiles(p){
  const b=state.people[p].budget;
  const inc=round2(sumAmt(b.income)+trackedIncome(p)), exp=sumAmt(b.expenses), sur=round2(inc-exp);
  return tile('Income',fmT(inc),'monthly')
       + tile('Expenses',fmT(exp),'monthly')
       + tile('Surplus',fmT(sur),'monthly',sur>=0?'pos':'neg');
}
function budgetRow(p,kind,r){
  return '<div class="brow" data-id="'+r.id+'">'
    +'<input type="text" data-edit="budget" data-kind="'+kind+'" data-field="name" value="'+esc(r.name)+'" placeholder="Name">'
    +'<input type="text" inputmode="decimal" data-edit="budget" data-kind="'+kind+'" data-field="amount" value="'+fixed2(r.amount||0)+'">'
    +'<button class="link danger" data-act="del-budget" data-kind="'+kind+'">Delete</button>'
    +'</div>';
}
function expenseChart(expenses){
  const items=expenses.filter(e=>(e.amount||0)>0).map(e=>({label:e.name||'(unnamed)',value:e.amount}))
                      .sort((a,b)=>b.value-a.value);
  return svgBarsH(items);
}
function budgetHTML(p){
  const b=state.people[p].budget;
  return '<div class="tiles" data-role="budget-summary">'+budgetTiles(p)+'</div>'
    +'<div class="card"><h2 class="card-h">Income</h2>'
    +'<div class="brow auto-row" data-role="tracked-income">'
    +'<div class="auto-name">Shift income (tracked)<span>'+monthLabel(todayISO().slice(0,7))+'</span></div>'
    +'<div class="auto-amt">'+fm(trackedIncome(p))+'</div>'
    +'</div>'
    +'<div>'+b.income.map(r=>budgetRow(p,'income',r)).join('')+'</div>'
    +'<button class="btn ghost sm addline" data-act="add-budget" data-kind="income">Add income source</button>'
    +'</div>'
    +'<div class="card"><h2 class="card-h">Expenses</h2>'
    +'<div>'+b.expenses.map(r=>budgetRow(p,'expenses',r)).join('')+'</div>'
    +'<button class="btn ghost sm addline" data-act="add-budget" data-kind="expenses">Add expense</button>'
    +'<div class="chart" data-role="expense-chart">'+expenseChart(b.expenses)+'</div>'
    +'</div>';
}

/* ---------- shifts ---------- */
function shiftSummaryTiles(t){
  return tile('Shifts',t.n,'all logged')
       + tile('Hours',t.hours.toFixed(2),'')
       + tile('Avg $/hr',fm(t.avg),'')

function monthTableInner(per){

    const k=(s.date||'').slice(0,7);
    if(!k) continue;

    const g=groups[k];
    g.n++; g.hours+=calcHours(s); g.wages+=calcWage(s,per.rates); g.tips+=(s.tips||0); g.total+=calcTotal(s,per.rates);
  }
  const keys=Object.keys(groups).sort().reverse();
  let html='<h2 class="card-h">Monthly totals</h2>';
  if(!keys.length) return html+'<div class="empty">No shifts logged</div>';
  html+='<div class="scroll"><table class="tbl"><thead><tr><th>Month</th><th>Shifts</th><th>Hours</th><th>Wages</th><th>Tips</th><th>Total</th></tr></thead><tbody>';
  for(const k of keys){
    const g=groups[k];
    html+='<tr><td>'+monthLabel(k)+'</td><td>'+g.n+'</td><td>'+g.hours.toFixed(2)+'</td><td>'+fm(g.wages)+'</td><td>'+fm(g.tips)+'</td><td class="strong">'+fm(g.total)+'</td></tr>';

function calGridHTML(p){
  const cs=calState[p], per=state.people[p];
  const parts=cs.ym.split('-').map(Number);
  const first=new Date(parts[0],parts[1]-1,1).getDay();
  const dim=new Date(parts[0],parts[1],0).getDate();
  const byDay={};
  for(const s of per.shifts){
    if((s.date||'').slice(0,7)===cs.ym){
      const d=+s.date.slice(8,10);
      (byDay[d]=byDay[d]||[]).push(s);
    }
  }
  const today=todayISO();
  let out='<div class="cal-grid">';
  for(const d of ['S','M','T','W','T','F','S']) out+='<div class="cal-dow">'+d+'</div>';
  for(let i=0;i<first;i++) out+='<div class="cal-day blank"></div>';
  for(let d=1;d<=dim;d++){
    const iso=cs.ym+'-'+String(d).padStart(2,'0');
    const has=byDay[d];
    const cls='cal-day'+(has?' has':'')+(iso===today?' today':'')+(iso===cs.sel?' sel':'');
    let amt='';
    if(has){
      let tot=0;
      for(const s of has) tot+=calcTotal(s,per.rates);
      amt='<span class="cal-amt">'+fm0(tot)+'</span>';
    }
    out+='<button type="button" class="'+cls+'" data-act="cal-day" data-date="'+iso+'"><span>'+d+'</span>'+amt+'</button>';
  }
  return out+'</div>';
}

function debtOutHTML(d){
  const base=amortize(d.balance,d.rate,d.term,0);
  if(!base){
    return '<div class="tiles t2 inner-tiles">'
      +tile('Monthly payment','&mdash;','')+tile('Payoff','&mdash;','')
      +tile('Total interest','&mdash;','')+tile('Interest saved','&mdash;','')+'</div>';
  }
  const extra=d.extra||0;
  const withX=extra>0 ? amortize(d.balance,d.rate,d.term,extra) : base;
  const saved=round2(base.totalInterest-withX.totalInterest);
  const series = extra>0
    ? [{pts:base.pts,color:C.gray,dash:true},{pts:withX.pts,color:C.green}]
    : [{pts:base.pts,color:C.green}];
  let html='<div class="tiles t2 inner-tiles">'
    +tile('Monthly payment',fmT(base.payment+extra), extra>0?('incl. '+fm0(extra)+' extra'):'')
    +tile('Payoff',yrMo(withX.months),inMonths(withX.months))
    +tile('Total interest',fmT(withX.totalInterest),'')
    +tile('Interest saved',fmT(saved),'',saved>0?'pos':'')
    +'</div>'
    +'<div class="chart">'+svgLine(series)+'</div>';
  if(extra>0){
    html+='<div class="legend">'
      +'<span><i style="background:'+C.gray+'"></i>Minimum payment</span>'
      +'<span><i style="background:'+C.green+'"></i>With extra</span></div>';
  }
  html+='<details class="sched"><summary>Amortization schedule</summary><div class="scroll">'
    +'<table class="tbl"><thead><tr><th>#</th><th>Payment</th><th>Interest</th><th>Principal</th><th>Balance</th></tr></thead><tbody>'
    +withX.rows.map(r=>'<tr><td>'+r.m+'</td><td>'+fm(r.payment)+'</td><td>'+fm(r.interest)+'</td><td>'+fm(r.principal)+'</td><td>'+fm(r.bal)+'</td></tr>').join('')
    +'</tbody></table></div></details>';
  return html;
}

/* ---------- combined ---------- */
function combinedHTML(){
  const A=state.people.arges, H=state.people.hannah;
  const ai=round2(sumAmt(A.budget.income)+trackedIncome('arges')), ax=sumAmt(A.budget.expenses);
  const hi=round2(sumAmt(H.budget.income)+trackedIncome('hannah')), hx=sumAmt(H.budget.expenses);
  const ti=round2(ai+hi), tx=round2(ax+hx), ts=round2(ti-tx);

  const at=shiftTotals(A.shifts,A.rates), ht=shiftTotals(H.shifts,H.rates);
  const cHours=round2(at.hours+ht.hours), cWages=round2(at.wages+ht.wages),
        cTips=round2(at.tips+ht.tips), cTotal=round2(at.total+ht.total);
  const cAvg=cHours>0?round2(cTotal/cHours):0;

  const months={};
  for(const per of [A,H]){
    for(const s of per.shifts){
      const k=(s.date||'').slice(0,7);
      if(!k) continue;
      months[k]=(months[k]||0)+calcTotal(s,per.rates);
    }
  }
  const mKeys=Object.keys(months).sort().slice(-12);
  const mItems=mKeys.map(k=>({label:monthShort(k),value:round2(months[k])}));

  const merged=[], idx={};
  for(const p of PEOPLE){
    for(const g of state.people[p].goals){
      const key=(g.name||'').trim().toLowerCase()||'(unnamed)';
      if(!(key in idx)){
        idx[key]=merged.length;
        merged.push({name:g.name||'(unnamed)',target:0,current:0,monthly:0,by:{arges:0,hannah:0}});
      }
      const m=merged[idx[key]];
      m.target+=(g.target||0); m.current+=(g.current||0); m.monthly+=(g.monthly||0); m.by[p]+=(g.current||0);
    }
  }
  const gT=round2(merged.reduce((a,m)=>a+m.target,0));
  const gC=round2(merged.reduce((a,m)=>a+m.current,0));
  const gM=round2(merged.reduce((a,m)=>a+m.monthly,0));
  const gRemain=Math.max(0,round2(gT-gC));
  let gProjV='&mdash;', gProjS='';
  if(gT>0 && gC>=gT){ gProjV='Complete'; }
  else if(gM>0 && gT>0){ const m=Math.ceil(gRemain/gM); gProjV=inMonths(m); gProjS=yrMo(m); }

  let html='<div class="card"><h2 class="card-h">Household budget</h2>'
    +'<div class="tiles inner-tiles" style="margin-bottom:12px">'
    +tile('Income',fmT(ti),'monthly')
    +tile('Expenses',fmT(tx),'monthly')
    +tile('Surplus',fmT(ts),'monthly',ts>=0?'pos':'neg')
    +'</div>'
    +'<div class="scroll"><table class="tbl"><thead><tr><th></th><th>Income</th><th>Expenses</th><th>Surplus</th></tr></thead><tbody>'
    +'<tr><td>Arges</td><td>'+fm(ai)+'</td><td>'+fm(ax)+'</td><td class="strong">'+fm(round2(ai-ax))+'</td></tr>'
    +'<tr><td>Hannah</td><td>'+fm(hi)+'</td><td>'+fm(hx)+'</td><td class="strong">'+fm(round2(hi-hx))+'</td></tr>'
    +'</tbody></table></div></div>';

  html+='<div class="card"><h2 class="card-h">Combined shift earnings</h2>'
    +'<div class="tiles inner-tiles" style="margin-bottom:12px">'
    +tile('Wages',fmT(cWages),'')
    +tile('Tips',fmT(cTips),'')
    +tile('Total earned',fmT(cTotal),'','pos hero')
    +tile('Hours',cHours.toFixed(2),'')
    +tile('Avg $/hr',fm(cAvg),'')
    +tile('Shifts',at.n+ht.n,'')
    +'</div>'
    +'<div class="scroll"><table class="tbl"><thead><tr><th></th><th>Shifts</th><th>Hours</th><th>Wages</th><th>Tips</th><th>Total</th><th>$/hr</th></tr></thead><tbody>'
    +'<tr><td>Arges</td><td>'+at.n+'</td><td>'+at.hours.toFixed(2)+'</td><td>'+fm(at.wages)+'</td><td>'+fm(at.tips)+'</td><td class="strong">'+fm(at.total)+'</td><td>'+fm(at.avg)+'</td></tr>'
    +'<tr><td>Hannah</td><td>'+ht.n+'</td><td>'+ht.hours.toFixed(2)+'</td><td>'+fm(ht.wages)+'</td><td>'+fm(ht.tips)+'</td><td class="strong">'+fm(ht.total)+'</td><td>'+fm(ht.avg)+'</td></tr>'
    +'</tbody></table></div>'
    +(mItems.length?'<div class="chart">'+svgColumns(mItems)+'</div>':'')
    +'</div>';

  html+='<div class="card"><h2 class="card-h">Household savings</h2>'
    +'<div class="tiles inner-tiles" style="margin-bottom:4px">'
    +tile('Saved',fm0(gC),'combined')
    +tile('Target',fm0(gT),'combined')
    +tile('Monthly',fm0(gM),'combined')
    +'</div>'
    +'<div class="tiles t2 inner-tiles" style="margin-bottom:10px">'
    +tile('Remaining',fm0(gRemain),'')
    +tile('Projected',gProjV,gProjS)
    +'</div>';
  if(merged.length){
    html+=merged.map(m=>{
      const pct=m.target>0?Math.min(100,m.current/m.target*100):0;
      return '<div class="gmerge">'
        +'<div class="gline"><span class="gname">'+esc(m.name)+'</span><span class="gnum">'+fm0(m.current)+' / '+fm0(m.target)+'</span></div>'
        +'<div class="pb"><i style="width:'+pct.toFixed(1)+'%"></i></div>'
        +'<div class="gsub">Arges '+fm0(m.by.arges)+' &middot; Hannah '+fm0(m.by.hannah)+' &middot; '+pct.toFixed(0)+'%</div>'
        +'</div>';
    }).join('');
  }else{
    html+='<div class="empty">No savings goals yet</div>';
  }
  html+='</div>';
  return html;
}

/* ============================================================
   COMMITS (independent per-field editing, no full re-render)
   ============================================================ */
function onShiftCommit(input,p,scope){
  const card=input.closest('.shift'); if(!card) return;
  const per=state.people[p];
  const s=per.shifts.find(x=>x.id===card.dataset.id); if(!s) return;
  const f=input.dataset.field;
  let changed=false;
  if(f==='date'){
    const v=input.value;
    if(v && v!==s.date){ pushUndo(p); s.date=v; changed=true; }
    else input.value=s.date;
  }else if(f==='in'||f==='out'){
    const v=input.value, cur=s[f]||'';
    if(v && v!==cur){ pushUndo(p); s[f]=v; changed=true; }
    else if(!v) input.value=cur;
  }else if(f==='tips'){
    const raw=input.value.trim();
    const n=raw===''?0:parseNum(raw);
    if(n!=null && n>=0){
      const v=round2(n);
      if(v!==(s.tips||0)){ pushUndo(p); s.tips=v; changed=true; }
    }
  }else{ // hours / wage / total / rate  (manual overrides)
    const raw=input.value.trim();
    s.ovr=s.ovr||{};
    if(raw===''){
      if(s.ovr[f]!=null){ pushUndo(p); delete s.ovr[f]; changed=true; }
    }else{
      const n=parseNum(raw);
      if(n!=null && n>=0){
        const v=round2(n);
        if(Math.abs(v-autoValue(s,per.rates,f))<0.005){
          if(s.ovr[f]!=null){ pushUndo(p); delete s.ovr[f]; changed=true; }
        }else if(s.ovr[f]!==v){ pushUndo(p); s.ovr[f]=v; changed=true; }
      }
    }
  }
  if(changed) save();
  refreshShiftCard(p,card);
  refreshShiftAggregates(p,scope);
  refreshCalendar(p,scope);
  if(f==='date' && calState[p].sel && s.date!==calState[p].sel){
    const ed=scope.querySelector('[data-role="day-editor"]');
    if(ed) ed.innerHTML=dayEditorHTML(p);
  }
}
function onRatesCommit(input,p,scope){
  const f=input.dataset.field, r=state.people[p].rates;
  const n=parseNum(input.value);
  if(n!=null && n>=0 && n!==r[f]){ r[f]=n; save(); }
  input.value = f==='base' ? fixed2(r[f]) : String(r[f]);
  scope.querySelectorAll('.shift').forEach(card=>refreshShiftCard(p,card));
  refreshShiftAggregates(p,scope);
  refreshCalendar(p,scope);
}
function onBudgetCommit(input,p,scope){
  const row=input.closest('.brow'); if(!row) return;
  const kind=input.dataset.kind;
  const item=state.people[p].budget[kind].find(x=>x.id===row.dataset.id); if(!item) return;
  if(input.dataset.field==='name'){
    const v=input.value.trim();
    if(v!==item.name){ item.name=v; save(); }
  }else{
    const n=parseNum(input.value);
    if(n!=null && n>=0 && round2(n)!==item.amount){ item.amount=round2(n); save(); }
    input.value=fixed2(item.amount||0);
  }
  const sm=scope.querySelector('[data-role="budget-summary"]');
  if(sm) sm.innerHTML=budgetTiles(p);
  const ec=scope.querySelector('[data-role="expense-chart"]');
  if(ec) ec.innerHTML=expenseChart(state.people[p].budget.expenses);
}
function onDebtCommit(input,p,scope){
  const card=input.closest('.debtcard'); if(!card) return;
  const d=state.people[p].debts.find(x=>x.id===card.dataset.id); if(!d) return;
  const f=input.dataset.field;
  if(f==='name'){
    const v=input.value.trim();
    if(v!==d.name){ d.name=v; save(); }
  }else{
    const n=parseNum(input.value);
    if(n!=null && n>=0){
      if(f==='term'){ const t=Math.round(n); if(t!==d.term){ d.term=t; save(); } }
      else if(round2(n)!==d[f]){ d[f]=round2(n); save(); }
    }
    input.value = f==='balance' ? fixed2(d.balance||0) : String(d[f]||0);
  }
  const out=card.querySelector('[data-role="debt-out"]');
  if(out) out.innerHTML=debtOutHTML(d);
}
function onGoalCommit(input,p,scope){
  const card=input.closest('.goalcard'); if(!card) return;
  const g=state.people[p].goals.find(x=>x.id===card.dataset.id); if(!g) return;
  const f=input.dataset.field;
  if(f==='name'){
    const v=input.value.trim();
    if(v!==g.name){ g.name=v; save(); }
  }else{
    const n=parseNum(input.value);
    if(n!=null && n>=0 && round2(n)!==g[f]){ g[f]=round2(n); save(); }
    input.value=fixed2(g[f]||0);
  }
  const out=card.querySelector('[data-role="goal-out"]');
  if(out) out.innerHTML=goalOutHTML(g);
}

/* ============================================================
   ACTIONS
   ============================================================ */
function addShift(p,scope){
  const date=calState[p].sel;
  if(!date) return;
  const g=k=>scope.querySelector('[data-add="'+k+'"]');
  const tin=g('in').value, tout=g('out').value;
  let ok=true;
  [['in',tin],['out',tout]].forEach(pair=>{
    const el=g(pair[0]);
    el.classList.toggle('err', !pair[1]);
    if(!pair[1]) ok=false;
  });
  if(!ok) return;
  const tips=parseNum(g('tips').value);
  pushUndo(p);
  state.people[p].shifts.push({ id:uid(), date, in:tin, out:tout, tips:round2(Math.max(0,tips||0)), ovr:{} });
  save(); renderContent();
}
/* ---------- backup: export / import ---------- */
function exportData(){
  save();
  const backup={ app:'finance-app-v3', version:1, exported:new Date().toISOString(), data:state };
  const json=JSON.stringify(backup,null,2);
  const name='finance-backup-'+todayISO()+'.json';
  const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)
    || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  if(isIOS && navigator.canShare && typeof File==='function'){
    try{
      const file=new File([json],name,{type:'application/json'});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file]}).catch(function(){});
        return;
      }
    }catch(e){}
  }
  const url=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  const a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); },2000);
}
function importData(file){
  const input=$('#importFile');
  const fr=new FileReader();
  fr.onerror=function(){ alert('Import failed. The file could not be read. Your current data was not changed.'); input.value=''; };
  fr.onload=function(){
    try{
      const parsed=JSON.parse(fr.result);
      const cand=(parsed && typeof parsed==='object' && parsed.data && typeof parsed.data==='object') ? parsed.data : parsed;
      if(!cand || typeof cand!=='object' || !cand.people || typeof cand.people!=='object'
         || (!cand.people.arges && !cand.people.hannah)) throw new Error('invalid');
      if(!confirm('This will replace all current data with the backup. Continue?')){ input.value=''; return; }
      state=normalizeState(cand);
      undoStacks.arges=[]; undoStacks.hannah=[];
      calState.arges={ym:null,sel:null}; calState.hannah={ym:null,sel:null};
      save(); render();
    }catch(e){
      alert('Import failed. That file is not a valid backup. Your current data was not changed.');
    }
    input.value='';
  };
  fr.readAsText(file);
}

/* ---------- gate ---------- */
function unlock(){
  const pw=$('#pw');
  if(pw.value===APP_PASSWORD){
    pw.value=''; pw.classList.remove('bad'); pw.blur();
    document.body.classList.remove('locked');
    render();
    window.scrollTo(0,0);
  }else{
    pw.value=''; pw.classList.add('bad');
    const c=$('#gateCard');
    c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');
  }
}
function lock(){
  if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
  save();
  document.body.classList.add('locked');
  $('#pw').classList.remove('bad');
  window.scrollTo(0,0);
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-act]');
  if(!btn) return;
  const act=btn.dataset.act;
  const scopeEl=btn.closest('[data-person]');
  const p=btn.dataset.person || (scopeEl?scopeEl.dataset.person:null);

  if(act==='lock'){ lock(); return; }
  if(act==='export'){ exportData(); return; }
  if(act==='import'){ $('#importFile').click(); return; }
  if(act==='main-tab'){ state.ui.main=btn.dataset.tab; save(); render(); return; }
  if(act==='sub-tab'){ state.ui.sub[p]=btn.dataset.tab; save(); renderContent(); return; }
  if(act==='add-shift'){ addShift(p,scopeEl); return; }
  if(act==='undo'){ doUndo(p); return; }
  if(act==='cal-prev'||act==='cal-next'){
    const cs=calState[p];
    cs.ym=shiftYM(cs.ym, act==='cal-prev'?-1:1);
    cs.sel=null;
    renderContent();
    return;
  }
  if(act==='cal-day'){
    calState[p].sel=btn.dataset.date;
    renderContent();
    return;
  }
  if(act==='del-shift'){
    const card=btn.closest('.shift');
    const arr=state.people[p].shifts;
    const i=arr.findIndex(x=>x.id===card.dataset.id);
    if(i>-1){ pushUndo(p); arr.splice(i,1); save(); renderContent(); }
    return;
  }
  if(act==='auto-field'){
    e.preventDefault();
    const card=btn.closest('.shift');
    const s=state.people[p].shifts.find(x=>x.id===card.dataset.id);
    const f=btn.dataset.field;
    if(s && s.ovr && s.ovr[f]!=null){
      pushUndo(p); delete s.ovr[f]; save();
      refreshShiftCard(p,card); refreshShiftAggregates(p,scopeEl); refreshCalendar(p,scopeEl);
    }
    return;
  }
  if(act==='add-budget'){
    state.people[p].budget[btn.dataset.kind].push({id:uid(),name:'',amount:0});
    save(); renderContent();
    const rows=document.querySelectorAll('#content [data-person="'+p+'"] .brow input[data-kind="'+btn.dataset.kind+'"][data-field="name"]');
    if(rows.length) rows[rows.length-1].focus();
    return;
  }
  if(act==='del-budget'){
    const row=btn.closest('.brow');
    const list=state.people[p].budget[btn.dataset.kind];
    const i=list.findIndex(x=>x.id===row.dataset.id);
    if(i>-1){ list.splice(i,1); save(); renderContent(); }
    return;
  }
  if(act==='add-debt'){
    state.people[p].debts.push({id:uid(),name:'',balance:0,rate:0,term:0,extra:0});
    save(); renderContent(); return;
  }
  if(act==='del-debt'){
    const card=btn.closest('.debtcard');
    const list=state.people[p].debts;
    const i=list.findIndex(x=>x.id===card.dataset.id);
    if(i>-1 && confirm('Delete this debt?')){ list.splice(i,1); save(); renderContent(); }
    return;
  }
  if(act==='add-goal'){
    state.people[p].goals.push({id:uid(),name:'',target:0,current:0,monthly:0});
    save(); renderContent(); return;
  }
  if(act==='del-goal'){
    const card=btn.closest('.goalcard');
    const list=state.people[p].goals;
    const i=list.findIndex(x=>x.id===card.dataset.id);
    if(i>-1 && confirm('Delete this goal?')){ list.splice(i,1); save(); renderContent(); }
    return;
  }
});

$('#content').addEventListener('focusout', e=>{
  const input=e.target;
  if(!(input instanceof HTMLInputElement)) return;
  if(input.dataset.add && input.value){ input.classList.remove('err'); }
  const kind=input.dataset.edit;
  if(!kind) return;
  const scope=input.closest('[data-person]');
  if(!scope) return;
  const p=scope.dataset.person;
  if(kind==='shift') onShiftCommit(input,p,scope);
  else if(kind==='rates') onRatesCommit(input,p,scope);
  else if(kind==='budget') onBudgetCommit(input,p,scope);
  else if(kind==='debt') onDebtCommit(input,p,scope);
  else if(kind==='goal') onGoalCommit(input,p,scope);
});

$('#content').addEventListener('input', e=>{
  const el=e.target;
  if(!(el instanceof HTMLInputElement) || el.type!=='range' || el.dataset.slide!=='extra') return;
  const card=el.closest('.debtcard');
  const scope=el.closest('[data-person]');
  if(!card||!scope) return;
  const d=state.people[scope.dataset.person].debts.find(x=>x.id===card.dataset.id);
  if(!d) return;
  d.extra=+el.value;
  save();
  const sv=card.querySelector('[data-role="extraval"]');
  if(sv) sv.textContent=fm0(d.extra);
  const out=card.querySelector('[data-role="debt-out"]');
  if(out) out.innerHTML=debtOutHTML(d);
});

$('#content').addEventListener('keydown', e=>{
  if(e.key==='Enter' && e.target instanceof HTMLInputElement && e.target.type!=='range'){
    e.preventDefault();
    e.target.blur();
  }
});

$('#unlockBtn').addEventListener('click', unlock);
$('#pw').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); unlock(); } });
$('#pw').addEventListener('input', ()=>$('#pw').classList.remove('bad'));
$('#importFile').addEventListener('change', e=>{
  const f=e.target.files && e.target.files[0];
  if(f) importData(f);
});

window.addEventListener('pagehide', save);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') save(); });

render();
</script>
